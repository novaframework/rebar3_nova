app = '{{name}}'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    port = 8080
    timeout = "5s"
    type = "http"

  [checks.ready]
    grace_period = "15s"
    interval = "15s"
    method = "GET"
    path = "/readyz"
    port = 8080
    timeout = "5s"
    type = "http"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
